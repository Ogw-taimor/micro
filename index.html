<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microbiology Exam Review</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f7f8fa;color:#1a1d23;min-height:100vh;padding:2rem 1rem}
.container{max-width:820px;margin:0 auto}

#splash{position:fixed;inset:0;background:#1a1d23;display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity 1s ease}
#splash.hide{opacity:0;pointer-events:none}
.splash-name{font-size:3.5rem;font-weight:700;letter-spacing:0.12em;color:#fff;font-family:Georgia,serif;opacity:0;animation:fadeInOut 2.2s ease forwards}
@keyframes fadeInOut{0%{opacity:0;transform:scale(.92)}30%{opacity:1;transform:scale(1)}75%{opacity:1}100%{opacity:0;transform:scale(1.04)}}

header{text-align:center;margin-bottom:2rem;padding:2rem;background:#fff;border:1px solid #e4e7ec;border-radius:16px}
header h1{font-size:1.5rem;font-weight:700;margin-bottom:.3rem}
header p{color:#6b7280;font-size:.88rem}

.tabs{display:flex;margin-bottom:1.5rem;border:1px solid #e4e7ec;border-radius:12px;overflow:hidden;background:#f1f3f5;flex-wrap:wrap}
.tab{flex:1;min-width:120px;padding:10px 12px;font-size:12.5px;font-weight:500;border:none;background:transparent;cursor:pointer;color:#6b7280;font-family:inherit;transition:all .15s}
.tab.active{background:#fff;color:#1a1d23;box-shadow:inset 0 -2px 0 #4f6ef2}

.top-bar{display:flex;align-items:center;gap:12px;padding:10px 14px;background:#fff;border-radius:12px;border:1px solid #e4e7ec;margin-bottom:1.25rem;flex-wrap:wrap}
.top-bar select{flex:1;min-width:180px;font-size:13px;padding:5px 8px;border-radius:8px;border:1px solid #e4e7ec;background:#fff;color:#1a1d23;font-family:inherit}
.stats{display:flex;gap:10px}
.stat{font-size:12px;color:#6b7280}
.stat b{color:#1a1d23}
.prog-wrap{flex:1;min-width:60px;height:4px;background:#e4e7ec;border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:#4f6ef2;border-radius:99px;transition:width .3s;width:0%}

.sec-title{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#6b7280;margin:1.5rem 0 .7rem;padding-bottom:5px;border-bottom:1px solid #e4e7ec}

.q-card{background:#fff;border:1px solid #e4e7ec;border-radius:12px;padding:1.25rem;margin-bottom:.85rem}
.q-top{display:flex;gap:10px;margin-bottom:.9rem}
.q-badge{flex-shrink:0;width:26px;height:26px;border-radius:6px;background:#eef1fd;color:#4f6ef2;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
.q-text{font-size:13.5px;font-weight:500;line-height:1.5;flex:1}
.opts{display:flex;flex-direction:column;gap:5px}

.opt{display:flex;align-items:flex-start;gap:8px;padding:8px 11px;border:1px solid #e4e7ec;border-radius:8px;cursor:pointer;background:transparent;text-align:left;width:100%;color:#1a1d23;font-family:inherit;font-size:13px;transition:border-color .15s,background .15s;line-height:1.45}
.opt:hover:not([disabled]){border-color:#4f6ef2;background:#eef1fd}
.opt-key{flex-shrink:0;width:20px;height:20px;border-radius:50%;border:1px solid #d1d5db;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#6b7280;margin-top:1px}
.opt-txt{flex:1}
.opt.s-correct{border-color:#bbf7d0;background:#f0fdf4}
.opt.s-correct .opt-key{background:#16a34a;border-color:#16a34a;color:#fff}
.opt.s-wrong{border-color:#fecaca;background:#fef2f2}
.opt.s-wrong .opt-key{background:#dc2626;border-color:#dc2626;color:#fff}
.opt.s-reveal{border-color:#fde68a;background:#fffbeb}
.opt.s-reveal .opt-key{background:#f59e0b;border-color:#f59e0b;color:#fff}
.opt:disabled{cursor:default}
.fb{margin-top:7px;padding:5px 9px;border-radius:5px;font-size:12px;font-weight:500;display:none}
.fb.show{display:block}
.fb.ok{background:#f0fdf4;color:#16a34a}
.fb.bad{background:#fef2f2;color:#dc2626}

.opt-ans{display:flex;align-items:flex-start;gap:8px;padding:8px 11px;border:1px solid #e4e7ec;border-radius:8px;font-size:13px;line-height:1.45;cursor:default;background:transparent}
.opt-ans.correct{border-color:#bbf7d0;background:#f0fdf4}
.opt-ans.correct .opt-key{background:#16a34a;border-color:#16a34a;color:#fff}

.tf-ans-badge{display:inline-block;padding:5px 18px;border-radius:7px;font-size:13px;font-weight:600;margin-top:8px}
.tf-ans-badge.true{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.tf-ans-badge.false{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}

.explanation{margin-top:10px;padding:9px 12px;background:#fafaff;border-left:3px solid #4f6ef2;border-radius:0 7px 7px 0;font-size:12.5px;color:#374151;line-height:1.55}
.explanation strong{color:#1a1d23}

/* Terms */
.term-card{background:#fff;border:1px solid #e4e7ec;border-radius:12px;padding:1.1rem 1.25rem;margin-bottom:.7rem}
.term-name{font-size:14px;font-weight:700;color:#4f6ef2;margin-bottom:5px}
.term-def{font-size:13px;color:#374151;line-height:1.55}

/* Rewrite */
.rw-card{background:#fff;border:1px solid #e4e7ec;border-radius:12px;padding:1.1rem 1.25rem;margin-bottom:.7rem}
.rw-wrong{font-size:13px;color:#dc2626;margin-bottom:8px;padding:8px 11px;background:#fef2f2;border-radius:8px;line-height:1.5}
.rw-wrong strong{color:#991b1b}
.rw-correct{font-size:13px;color:#16a34a;padding:8px 11px;background:#f0fdf4;border-radius:8px;line-height:1.5}
.rw-correct strong{color:#15803d}

.reset-btn{display:block;margin:1.5rem auto 0;padding:7px 22px;border:1px solid #d1d5db;border-radius:8px;background:transparent;color:#6b7280;font-family:inherit;font-size:13px;cursor:pointer;transition:all .15s}
.reset-btn:hover{border-color:#4f6ef2;color:#4f6ef2}
@media(max-width:540px){header h1{font-size:1.2rem}.splash-name{font-size:2.2rem}.tab{font-size:11px}}
</style>
</head>
<body>

<div id="splash"><div class="splash-name">A.Qady</div></div>

<div class="container">
<header>
  <h1>Microbiology Exam Review</h1>
  <p>100 MCQs &middot; Scientific Terms &middot; Rewrite-the-Error</p>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('try')">Try by yourself</button>
  <button class="tab" onclick="switchTab('answered')">MCQ Answered</button>
  <button class="tab" onclick="switchTab('terms')">Scientific Terms</button>
  <button class="tab" onclick="switchTab('rewrite')">Rewrite-the-Error</button>
  <button class="tab" onclick="switchTab('pastexams')">Past Years Exams</button>
</div>

<!-- TRY PANEL (MCQ only) -->
<div id="try-panel">
  <div class="top-bar">
    <select id="sel-try" onchange="filterTry()">
      <option value="all">All sections (100)</option>
      <option value="0">Gram+ Aerobic Bacilli</option>
      <option value="1">Gram+ Anaerobic Bacilli (Clostridium)</option>
      <option value="2">Acid-Fast Bacilli &amp; Neisseria</option>
      <option value="3">Gram-Negative Bacilli</option>
      <option value="4">Staphylococcus &amp; Streptococcus</option>
      <option value="5">Sterilization</option>
      <option value="6">Mycology</option>
      <option value="7">Virology</option>
    </select>
    <div class="stats"><span class="stat">✓ <b id="sc">0</b></span><span class="stat">✗ <b id="sw">0</b></span></div>
    <div class="prog-wrap"><div class="prog-fill" id="prog"></div></div>
    <span class="stat" id="stot">0/100</span>
  </div>
  <div id="try-quiz"></div>
  <button class="reset-btn" onclick="resetTry()">↺ Reset</button>
</div>

<!-- MCQ ANSWERED PANEL -->
<div id="answered-panel" style="display:none">
  <div class="top-bar">
    <select id="sel-ans" onchange="filterAns()">
      <option value="all">All sections (100)</option>
      <option value="0">Gram+ Aerobic Bacilli</option>
      <option value="1">Gram+ Anaerobic Bacilli (Clostridium)</option>
      <option value="2">Acid-Fast Bacilli &amp; Neisseria</option>
      <option value="3">Gram-Negative Bacilli</option>
      <option value="4">Staphylococcus &amp; Streptococcus</option>
      <option value="5">Sterilization</option>
      <option value="6">Mycology</option>
      <option value="7">Virology</option>
    </select>
  </div>
  <div id="ans-quiz"></div>
</div>

<!-- SCIENTIFIC TERMS PANEL (always answered/ready) -->
<div id="terms-panel" style="display:none">
  <div id="terms-list"></div>
</div>

<!-- REWRITE-THE-ERROR PANEL (always answered/ready) -->
<div id="rewrite-panel" style="display:none">
  <div id="rewrite-list"></div>
</div>

<!-- PAST YEARS EXAMS PANEL (always answered/ready) -->
<div id="pastexams-panel" style="display:none">
  <div id="pastexams-list"></div>
</div>

</div>

<script>
// ===== SPLASH =====
setTimeout(()=>{
  const s=document.getElementById('splash');
  s.classList.add('hide');
  setTimeout(()=>s.remove(),1000);
},2200);

const SECTIONS=["Gram+ Aerobic Bacilli", "Gram+ Anaerobic Bacilli (Clostridium)", "Acid-Fast Bacilli & Neisseria", "Gram-Negative Bacilli", "Staphylococcus & Streptococcus", "Sterilization", "Mycology", "Virology"];
const QS=[{"s": 0, "q": "The diphtheria exotoxin exerts its lethal effect by:", "o": ["Producing β-lactamase", "Inactivating Elongation Factor-2, blocking protein synthesis", "Disrupting the cytoplasmic membrane", "Inhibiting DNA gyrase"], "a": 1, "exp": "The exotoxin inactivates EF-2, halting ribosomal translation, leading to systemic damage (heart, suprarenal glands, nerves)."}, {"s": 0, "q": "Why does the pseudomembrane in diphtheria cause suffocation but NOT bacteremia?", "o": ["The pseudomembrane is sterile and non-infectious", "The toxin destroys red blood cells directly", "The organism invades the bloodstream rapidly", "The organism multiplies locally without invading tissue; only the toxin is absorbed systemically"], "a": 3, "exp": "C. diphtheriae adheres and multiplies locally (non-invasive); only the exotoxin disseminates systemically."}, {"s": 0, "q": "On Gram stain, the \"Chinese letter\" arrangement is characteristic of:", "o": ["Corynebacterium diphtheriae", "Mycobacterium tuberculosis", "Clostridium tetani", "Bacillus anthracis"], "a": 0, "exp": "C. diphtheriae shows club-shaped bacilli arranged in V, L, or parallel \"Chinese letter\" patterns."}, {"s": 0, "q": "Elek's test is used to detect:", "o": ["Toxigenicity of C. diphtheriae in vitro", "Capsule formation", "Spore formation", "Motility"], "a": 0, "exp": "A precipitation line forms between toxin (from bacterial growth) and antitoxin (from filter paper strip)."}, {"s": 0, "q": "Which feature distinguishes diphtheria from acute follicular tonsillitis on blood agar?", "o": ["Diphtheria shows no hemolysis; tonsillitis (S. pyogenes) shows β-hemolysis", "Both show identical hemolysis", "Neither grows on blood agar", "Diphtheria shows β-hemolysis; tonsillitis shows none"], "a": 0, "exp": "C. diphtheriae is non-hemolytic; S. pyogenes causes β-hemolysis."}, {"s": 0, "q": "Bacillus anthracis spores in soil can survive for up to:", "o": ["10 years", "Indefinitely without any limit established", "100 years", "1 year"], "a": 2, "exp": "Soil is the natural reservoir; spores remain viable for up to 100 years."}, {"s": 0, "q": "The most common form of human anthrax (~98% of cases) is:", "o": ["Cutaneous anthrax (malignant pustule)", "Gastrointestinal anthrax", "Pneumonic anthrax", "Septicemic anthrax"], "a": 0, "exp": "Acquired via injured skin/mucous membranes; progresses papule→vesicle→pustule→necrotic ulcer."}, {"s": 0, "q": "The two main virulence factors of B. anthracis are:", "o": ["Capsular polypeptide (anti-phagocytic) and exotoxin", "β-lactamase and efflux pumps", "Flagella and pili", "LPS and porins"], "a": 0, "exp": "The capsule prevents phagocytosis; the exotoxin causes systemic damage."}, {"s": 0, "q": "\"Medusa head\" colonies on nutrient agar are characteristic of:", "o": ["C. diphtheriae", "Clostridium tetani", "B. anthracis", "Mycobacterium tuberculosis"], "a": 2, "exp": "Rough, irregular colonies with an irregular outline; non-hemolytic on blood agar."}, {"s": 0, "q": "The Ascoli test in anthrax diagnosis is a:", "o": ["Animal inoculation test", "Gram stain variant", "PCR-based test", "Thermo-precipitation reaction between tissue extract and antibody"], "a": 3, "exp": "Tissue extract (hair/wool) + antibody in a capillary tube → precipitation zone confirms anthrax antigen."}, {"s": 0, "q": "Anthracoids differ from true anthrax in that they are:", "o": ["Non-motile and Ascoli test positive", "Non-capsulated, motile, β-hemolytic, and non-pathogenic to animals", "Capsulated and Ascoli test positive", "Capsulated and non-motile"], "a": 1, "exp": "Anthracoids (e.g., B. cereus, B. subtilis) lack the capsule, are motile, hemolytic, and avirulent in animals — opposite of anthrax."}, {"s": 0, "q": "Bacillus cereus food poisoning is mediated by:", "o": ["Mycolic acid", "Cord factor", "Enterotoxin", "Exotoxin A"], "a": 2, "exp": "B. cereus produces an enterotoxin causing food poisoning (classically associated with rice)."}, {"s": 0, "q": "Diphtheria toxoid is prepared by treating the toxin filtrate with:", "o": ["UV radiation", "Formaldehyde", "Heat alone", "Hydrochloric acid"], "a": 1, "exp": "Formaldehyde converts the toxin into a non-toxic but immunogenic toxoid, adsorbed onto aluminum hydroxide."}, {"s": 0, "q": "Why is passive immunization (antitoxin) given urgently in diphtheria treatment alongside antibiotics?", "o": ["Antitoxin replaces the need for a vaccine", "Antibiotics increase toxin production", "Antitoxin neutralizes circulating toxin immediately, while antibiotics only eliminate the bacteria", "Antibiotics alone cannot kill the bacteria at all"], "a": 2, "exp": "The toxin already released continues to damage tissues; antitoxin neutralizes it directly, unlike antibiotics which only stop further bacterial growth."}, {"s": 1, "q": "Which Clostridium species is the exception — non-motile and capsulated?", "o": ["Cl. tetani", "Cl. botulinum", "Cl. difficile", "Cl. perfringens"], "a": 3, "exp": "All other Clostridium are typically motile and non-capsulated; Cl. perfringens is the reverse."}, {"s": 1, "q": "Tetanospasmin causes spastic paralysis by:", "o": ["Inhibiting peptidyl transferase", "Blocking acetylcholine release at the NMJ", "Directly lysing muscle cell membranes", "Blocking release of inhibitory neurotransmitters glycine and GABA"], "a": 3, "exp": "Loss of inhibitory neurotransmitters causes uncontrolled simultaneous muscle spasm (spastic paralysis)."}, {"s": 1, "q": "Why does ingestion of tetanus toxin NOT cause disease?", "o": ["The toxin is inactivated by proteolytic digestive enzymes", "Tetanus toxin only acts on skin", "The gut has no nerve endings", "The toxin is not absorbed by the gut"], "a": 0, "exp": "Tetanospasmin is a heat-labile protein destroyed by the digestive system's proteolytic enzymes."}, {"s": 1, "q": "The classic \"drumstick\" Gram stain appearance belongs to:", "o": ["Cl. tetani", "Cl. difficile", "Cl. botulinum", "Cl. perfringens"], "a": 0, "exp": "Terminal spherical bulging spores with peritrichous flagella give the drumstick appearance."}, {"s": 1, "q": "Botulinum toxin causes flaccid paralysis through which mechanism?", "o": ["Inhibiting DNA gyrase", "Disrupting RBC membranes", "Blocking acetylcholine release at the neuromuscular junction", "Blocking glycine/GABA release"], "a": 2, "exp": "Blocking ACh (an excitatory neurotransmitter) prevents muscle contraction = flaccid paralysis (opposite of tetanus)."}, {"s": 1, "q": "Infant botulism is classically linked to ingestion of:", "o": ["Undercooked meat", "Contaminated canned vegetables", "Honey", "Unpasteurized milk"], "a": 2, "exp": "Spores in honey/household dust germinate in the immature infant gut flora (<1 year)."}, {"s": 1, "q": "The main toxin responsible for massive hemolysis in gas gangrene is:", "o": ["Tetanospasmin", "Alpha toxin (lecithinase)", "Exotoxin B", "Botulinum toxin"], "a": 1, "exp": "Alpha toxin disrupts cell membranes (RBCs, WBCs), causing hemolysis, tissue destruction, and hepatic toxicity."}, {"s": 1, "q": "The gas produced in gas gangrene reacts with tissue iron to cause:", "o": ["Whitening of tissue", "Bright red discoloration", "No visible change", "Blackening of organs and foul smell"], "a": 3, "exp": "Gas (H2, CO2, N2, H2S) reacting with iron causes the characteristic blackening and odor."}, {"s": 1, "q": "Nagler's test detects which enzymatic activity?", "o": ["Lecithinase (alpha toxin)", "Urease", "Catalase", "Coagulase"], "a": 0, "exp": "Opalescence on egg yolk agar indicates lecithinase activity, used to identify Cl. perfringens."}, {"s": 1, "q": "Why is antibiotic therapy ALONE insufficient for gas gangrene?", "o": ["Antibiotics promote more gas formation", "The infection is purely viral", "Cl. perfringens is universally resistant to all antibiotics", "Antibiotics cannot penetrate poorly perfused (ischemic) muscle tissue effectively"], "a": 3, "exp": "Reduced blood supply prevents adequate antibiotic concentration in infected tissue; surgical debridement and HBOT are also required."}, {"s": 1, "q": "Pseudomembranous colitis (Cl. difficile) commonly follows use of:", "o": ["Antifungal agents", "Aspirin", "Clindamycin, ampicillin, cephalosporins, fluoroquinolones", "Topical antiseptics"], "a": 2, "exp": "These antibiotics suppress normal flora, allowing Cl. difficile overgrowth and toxin production (superinfection)."}, {"s": 1, "q": "Exotoxin B of Cl. difficile is classified as a:", "o": ["Cytotoxin damaging colonic mucosa", "Hemolysin", "Enterotoxin causing diarrhea", "Neurotoxin"], "a": 0, "exp": "Exotoxin A is the enterotoxin (diarrhea); Exotoxin B is the cytotoxin causing mucosal damage/pseudomembrane formation."}, {"s": 1, "q": "The biochemical classification places Cl. tetani and Cl. botulinum in the:", "o": ["Aerobic group", "Lipolytic group", "Proteolytic group", "Saccharolytic group"], "a": 2, "exp": "They grow rapidly with protein, liquefy gelatin, and coagulate serum (Cl. perfringens is saccharolytic)."}, {"s": 1, "q": "Why can pregnant women receive tetanus toxoid safely and beneficially in the 3rd trimester?", "o": ["Maternal antibodies cross the placenta, protecting the neonate from neonatal tetanus", "It prevents preterm labor", "It treats active maternal infection", "It has no real benefit, purely routine"], "a": 0, "exp": "Trans-placental antibody transfer protects the newborn against umbilical stump-related neonatal tetanus."}, {"s": 2, "q": "The acid-fast property of Mycobacteria is due to:", "o": ["Spore formation", "High lipid content (mycolic acid, ~60%) in the cell wall", "High protein content", "Presence of LPS"], "a": 1, "exp": "Mycolic acid-rich, waxy, hydrophobic cell wall resists decolorization by acid-alcohol."}, {"s": 2, "q": "Why does antibody-mediated immunity fail against extracellular M. tuberculosis?", "o": ["Antibodies cannot be produced against mycobacteria at all", "The high lipid cell wall resists complement-mediated killing", "M. tuberculosis has no surface antigens", "AMI works only against viruses"], "a": 1, "exp": "High lipid content confers resistance to complement, so only cell-mediated immunity (CMI) is effective."}, {"s": 2, "q": "The Ghon focus is associated with which clinical TB form?", "o": ["Primary infection (exudative lesion)", "Post-primary/reactivation TB", "Atypical mycobacterial disease", "Miliary TB"], "a": 0, "exp": "Organism replicates in macrophages until CMI develops, forming the Ghon focus (lymphadenitis, fibrosis, calcification)."}, {"s": 2, "q": "Cord factor's specific virulence function is:", "o": ["Caseation necrosis", "Conversion to L-forms", "Resistance to acids/alkali", "Inhibition of leukocyte migration"], "a": 3, "exp": "Cord factor specifically inhibits leukocyte migration (phosphatides cause caseation; mycolic acid resists chemicals/phagocytosis broadly)."}, {"s": 2, "q": "TB treatment requires prolonged duration mainly because of:", "o": ["Fast mutation rate alone", "High lipid wall blocking drug penetration + intracellular location + caseous material + slow growth", "All TB drugs being purely bacteriostatic", "Poor patient compliance only"], "a": 1, "exp": "Multiple combined factors necessitate long-term combination therapy."}, {"s": 2, "q": "On Lowenstein-Jensen medium, M. tuberculosis colonies appear as:", "o": ["Bread-crumb-like, yellow colonies", "Smooth creamy white colonies", "Greyish-black colonies", "Medusa head colonies"], "a": 0, "exp": "Characteristic appearance after slow growth (2-8 weeks) on this enriched, egg-based selective medium."}, {"s": 2, "q": "The Mantoux (tuberculin) test diagnoses:", "o": ["Latent TB infection via cell-mediated immunity", "Atypical mycobacterial infection only", "Active pulmonary TB directly", "TB drug resistance"], "a": 0, "exp": "An indirect method relying on CMI, distinguishing latent infection (unlike direct ZN stain/culture for active disease)."}, {"s": 2, "q": "M. kansasii is classified as a photochromogen because it:", "o": ["Produces yellow-orange pigment in the presence of light", "Never produces pigment", "Grows only at 25°C", "Produces pigment only in the dark"], "a": 0, "exp": "Photochromogens need light exposure to produce pigment (vs. scotochromogens like M. scrofulaceum, pigmented in the dark)."}, {"s": 2, "q": "Why can't M. leprae be cultured on artificial media?", "o": ["It is an obligate intracellular parasite lacking genes for independent survival", "It requires anaerobic conditions exclusively", "It needs extremely high CO2 levels", "It is destroyed instantly by oxygen"], "a": 0, "exp": "It lacks many essential genes, requiring intracellular growth (mouse footpad/armadillo only)."}, {"s": 2, "q": "M. leprae preferentially infects skin and superficial nerves because:", "o": ["It is destroyed by stomach acid in deeper tissues", "It requires extremely high oxygen tension found only in skin", "Its optimal growth temperature (30°C) is below core body temperature", "It can only survive in keratinized tissue"], "a": 2, "exp": "30°C optimal growth favors cooler peripheral tissues over warmer internal organs."}, {"s": 2, "q": "The Lepromin skin test is used to:", "o": ["Distinguish lepromatous from tuberculoid leprosy (not for diagnosis)", "Diagnose active leprosy definitively", "Confirm cure after treatment", "Detect latent TB co-infection"], "a": 0, "exp": "Similar concept to tuberculin test but classifies leprosy type rather than diagnosing the disease."}, {"s": 2, "q": "Non-piliated strains of N. gonorrhoeae are clinically significant because they are:", "o": ["Undetectable by oxidase test", "Avirulent — pili are essential for epithelial adherence", "Unable to produce LPS", "More resistant to antibiotics"], "a": 1, "exp": "Pili (Protein II)-mediated adherence is essential for colonization; without it, the organism cannot establish infection."}, {"s": 2, "q": "The key biochemical difference between N. gonorrhoeae and N. meningitidis is:", "o": ["IgA protease production only in meningitidis", "Carbohydrate fermentation pattern (glucose only vs. glucose + maltose)", "Oxidase reaction", "Capsule presence in gonorrhoeae"], "a": 1, "exp": "N. gonorrhoeae ferments glucose only; N. meningitidis ferments both glucose and maltose. Both are oxidase+ and produce IgA protease."}, {"s": 2, "q": "Why are non-capsulated N. meningitidis strains avirulent?", "o": ["They lose fermentation ability", "The capsule is anti-phagocytic; without it, phagocytes destroy the organism easily", "They cannot produce LPS", "They cannot survive in the nasopharynx at all"], "a": 1, "exp": "Capsular polysaccharide protects against phagocytosis; its loss removes this protection."}, {"s": 3, "q": "Pseudomonas aeruginosa is classified on oxidation-fermentation testing as:", "o": ["O+/F+", "O+/F- (strict aerobe)", "O-/F-", "O-/F+"], "a": 1, "exp": "Strict aerobe; positive oxidation, negative fermentation."}, {"s": 3, "q": "The blue-green pigment in P. aeruginosa wound infections is:", "o": ["Melanin", "Pyoverdin", "Pyocyanin", "Fluorescin"], "a": 2, "exp": "Pyocyanin specifically gives the blue-green color characteristic of P. aeruginosa pus."}, {"s": 3, "q": "Which two Enterobacteriaceae genera are non-motile?", "o": ["Klebsiella and Shigella", "E. coli and Salmonella", "Vibrio and Klebsiella", "Proteus and Citrobacter"], "a": 0, "exp": "All Enterobacteriaceae are motile except Klebsiella and Shigella."}, {"s": 3, "q": "The IMViC pattern for E. coli is:", "o": ["+ + - -", "- - + +", "- + + -", "+ - - -"], "a": 0, "exp": "E. coli: Indole+, MR+, VP-, Citrate- (Klebsiella shows the opposite pattern)."}, {"s": 3, "q": "E. coli's K1 capsular antigen is specifically linked to:", "o": ["Endotoxic shock", "Neonatal meningitis", "Gastroenteritis", "Urinary tract infection"], "a": 1, "exp": "The K1 antigen is specifically associated with neonatal meningitis caused by E. coli."}, {"s": 3, "q": "Which Salmonella species is detected in stool ONLY (does not penetrate mucosa)?", "o": ["S. paratyphi", "S. choleraesuis", "S. typhi", "S. enteritidis"], "a": 3, "exp": "S. enteritidis causes food poisoning without mucosal penetration, hence stool-only detection."}, {"s": 3, "q": "The Vi antigen of S. typhi functions as:", "o": ["A flagellar antigen for motility", "An adhesion pilus", "An anti-phagocytic polysaccharide capsule", "A urease enzyme"], "a": 2, "exp": "Vi antigen is anti-phagocytic, aiding immune evasion."}, {"s": 3, "q": "On TSI agar, S. typhi characteristically shows:", "o": ["Alkaline slant, acid butt with H2S (black butt)", "No reaction at all", "Acid slant with no gas", "Acid slant, acid butt"], "a": 0, "exp": "This pattern, with H2S production, is classic for S. typhi."}, {"s": 3, "q": "Vibrio cholerae differs from most gut pathogens by tolerating:", "o": ["Anaerobic conditions exclusively", "Alkaline pH (8-9.5)", "Extremely high salt only", "Strongly acidic pH"], "a": 1, "exp": "V. cholerae tolerates alkaline pH up to 9.5, despite being acid-sensitive."}, {"s": 3, "q": "Why must glucose be added to oral rehydration solutions in cholera treatment?", "o": ["Sodium absorption in the gut is glucose-dependent", "It prevents vomiting directly", "Glucose kills the bacteria", "For taste improvement only"], "a": 0, "exp": "Glucose-coupled sodium transport is essential for effective rehydration."}, {"s": 3, "q": "H. pylori survives the acidic stomach mainly by:", "o": ["Producing a thick protective capsule", "Secreting a heat-stable endotoxin", "Forming dormant spores", "Using flagella to colonize under the mucosa, away from acidic pH"], "a": 3, "exp": "Flagella allow burrowing beneath the gastric mucus layer, away from the highly acidic lumen."}, {"s": 3, "q": "The biochemical test forming the basis of the H. pylori urea breath test is:", "o": ["Catalase", "Urease", "Coagulase", "Oxidase"], "a": 1, "exp": "Urease breaks down labeled urea, releasing detectable CO2."}, {"s": 3, "q": "Bordetella pertussis is cultured on which special medium?", "o": ["Skirrow's medium", "Lowenstein-Jensen", "TCBS agar", "Bordet-Gengou medium"], "a": 3, "exp": "Glycerol, potato, and horse blood produce characteristic pearl-like colonies."}, {"s": 3, "q": "The classic \"whoop\" sound in pertussis occurs during which stage?", "o": ["Catarrhal stage", "Incubation period", "Paroxysmal stage", "Convalescent stage"], "a": 2, "exp": "Repetitive dry coughing fits followed by an inspiratory whoop characterize this 2-6 week stage."}, {"s": 4, "q": "The genus-level test differentiating Staphylococcus from Streptococcus is:", "o": ["Coagulase", "Catalase", "Oxidase", "Urease"], "a": 1, "exp": "Staph is catalase+; Strep is catalase-."}, {"s": 4, "q": "S. aureus Protein A functions by:", "o": ["Binding the Fc portion of IgG, blocking opsonization", "Hydrolyzing fibrin", "Destroying DNA", "Clotting plasma"], "a": 0, "exp": "Protein A interferes with humoral immunity by binding antibody incorrectly, preventing normal phagocyte recognition."}, {"s": 4, "q": "Why are 90% of hospital S. aureus strains resistant to standard penicillin?", "o": ["Capsule formation alone", "Permanent conversion to L-forms", "β-lactamase production destroying β-lactam antibiotics", "Loss of cell wall"], "a": 2, "exp": "β-lactamase inactivates penicillin and related antibiotics in the majority of hospital strains."}, {"s": 4, "q": "Scalded Skin Syndrome (Ritter disease) results from:", "o": ["Alpha toxin", "Enterotoxins", "Exfoliative toxins", "TSST"], "a": 2, "exp": "Exfoliative toxins cause generalized skin desquamation, most common in young children."}, {"s": 4, "q": "MRSA infections are treated with:", "o": ["Ampicillin", "Vancomycin", "Methicillin", "Penicillin"], "a": 1, "exp": "MRSA resistance affects methicillin and related penicillins, necessitating Vancomycin."}, {"s": 4, "q": "Group A Streptococcus (S. pyogenes) primarily evades phagocytosis via:", "o": ["Mycolic acid", "β-lactamase", "Endotoxin", "M-protein"], "a": 3, "exp": "M-protein enables colonization and escape from phagocytosis."}, {"s": 4, "q": "ASO titer testing relies on antigenicity of:", "o": ["Streptolysin O", "Hyaluronidase", "Streptolysin S", "Streptokinase"], "a": 0, "exp": "Streptolysin O is oxygen-sensitive and antigenic, unlike Streptolysin S."}, {"s": 4, "q": "The CAMP test specifically identifies:", "o": ["S. pyogenes", "S. pneumoniae", "Enterococcus faecalis", "S. agalactiae"], "a": 3, "exp": "CAMP factor enlarges the hemolysis zone of S. aureus beta-lysin, identifying Group B strep."}, {"s": 4, "q": "The main virulence factor of S. pneumoniae is:", "o": ["β-lactamase", "M-protein", "Streptokinase", "Polysaccharide capsule"], "a": 3, "exp": "The capsule is the principal virulence determinant, alongside pneumolysin toxin."}, {"s": 4, "q": "Why is PCV13 preferred over PPSV23 in children under 2 years?", "o": ["PCV13 requires no booster doses", "PPSV23 (pure polysaccharide) fails to elicit adequate immune response in young children; PCV13's conjugation with diphtheria toxoid overcomes this", "PCV13 covers more serotypes", "PPSV23 cannot be given to anyone over 19"], "a": 1, "exp": "Pure polysaccharide antigens are poorly immunogenic in children <2; conjugation solves this problem."}, {"s": 5, "q": "A Sterility Assurance Level (SAL) of 10^-6 means:", "o": ["≤1 chance in a million of contamination after sterilization", "1 in 1000 items contaminated", "All items are guaranteed sterile", "Sterilization at 10^-6 atmospheres"], "a": 0, "exp": "This is the standard for items contacting compromised tissue."}, {"s": 5, "q": "The most resistant organism type (excluding prions) in the order of resistance is:", "o": ["Lipid-enveloped viruses", "Fungi", "Bacterial spores", "Vegetative bacteria"], "a": 2, "exp": "Bacterial spores require true sterilization; only prions are more resistant."}, {"s": 5, "q": "Dry heat sterilization kills organisms mainly through:", "o": ["Coagulation of proteins", "UV-induced DNA damage", "Destructive oxidation", "Osmotic lysis"], "a": 2, "exp": "Distinct from moist heat's coagulation/denaturation mechanism."}, {"s": 5, "q": "Standard dry heat parameters are:", "o": ["100°C/30 min", "121°C/15 min", "170°C/1hr or 160°C/2hr", "60°C/1hr"], "a": 2, "exp": "Much hotter and longer than moist heat sterilization."}, {"s": 5, "q": "Autoclaves reach temperatures above 100°C because:", "o": ["They use UV radiation", "Increased pressure raises water's boiling point", "Chemical reaction with the chamber metal", "They use dry heat instead of steam"], "a": 1, "exp": "Like a pressure cooker; pressure increase allows steam to reach 121-134°C."}, {"s": 5, "q": "The biological indicator for autoclave monitoring uses spores of:", "o": ["Bacillus stearothermophilus", "Mycobacterium tuberculosis", "Clostridium tetani", "Bacillus anthracis"], "a": 0, "exp": "Cultured after sterilization to confirm spore killing — the most reliable monitoring method."}, {"s": 5, "q": "Autoclaving is unsuitable for:", "o": ["Oils and powders", "Ampoules of aqueous injections", "Surgical dressings", "Microbiological media"], "a": 0, "exp": "Steam cannot effectively penetrate oils/powders; dry heat is used instead."}, {"s": 5, "q": "Properly pasteurized milk should test:", "o": ["Positive for catalase", "Positive for phosphatase", "Positive for coagulase", "Negative with methylene blue test"], "a": 3, "exp": "Pasteurization destroys phosphatase; correct treatment gives a negative methylene blue test."}, {"s": 5, "q": "Tyndallisation is specifically used for media containing:", "o": ["Oils and petroleum products", "Heat-stable inorganic salts", "Heat-labile substances (sugar, milk, gelatin)", "Metallic instruments only"], "a": 2, "exp": "Continuous high heat would damage these heat-labile components; intermittent heating is gentler."}, {"s": 5, "q": "The D value specifically measures:", "o": ["Total time to kill 100% of a population", "Temperature increase needed to double kill rate", "Time at fixed temperature for 90% reduction in viable cells", "The lowest temperature killing all organisms in 10 minutes"], "a": 2, "exp": "D value = time for 1-log (90%) reduction — a resistance measure."}, {"s": 6, "q": "Superficial mycoses are characterized by:", "o": ["Infection limited to stratum corneum with no immune response (cosmetic only)", "Granuloma formation", "Systemic dissemination", "Deep tissue invasion with strong immune response"], "a": 0, "exp": "No living tissue invasion and no cellular host response — purely cosmetic concern."}, {"s": 6, "q": "Pityriasis versicolor is caused by:", "o": ["Malassezia furfur", "Candida albicans", "Hortaea werneckii", "Trichophyton rubrum"], "a": 0, "exp": "Causes hypo/hyperpigmented patches on the trunk; KOH shows \"spaghetti and meatballs\" appearance."}, {"s": 6, "q": "Tinea capitis with fungus located INSIDE the hair shaft is termed:", "o": ["Ectothrix", "Kerion", "Endothrix", "Onychomycosis"], "a": 2, "exp": "Endothrix = fungus inside the shaft; Ectothrix = fungus on the surface."}, {"s": 6, "q": "Wood's light examination shows green fluorescence with infections caused by:", "o": ["Epidermophyton floccosum", "Trichophyton rubrum", "Candida albicans", "Microsporum species"], "a": 3, "exp": "Tissues infected with Microsporum fluoresce green under UV light."}, {"s": 6, "q": "Oral candidiasis (thrush) commonly occurs in:", "o": ["Only in elderly males", "Healthy adults with no risk factors", "Patients with hyperthyroidism", "Children on prolonged antibiotics and immunosuppressed patients (e.g., AIDS)"], "a": 3, "exp": "Disruption of normal flora/immune suppression predisposes to oral Candida overgrowth."}, {"s": 6, "q": "The drug of choice for systemic candidiasis is:", "o": ["Nystatin", "Griseofulvin", "Amphotericin B", "Terbinafine"], "a": 2, "exp": "Amphotericin B is the systemic treatment of choice, plus removal of predisposing factors (e.g., catheter)."}, {"s": 6, "q": "The three virulence determinants of Cryptococcus neoformans are:", "o": ["Flagella, pili, capsule", "Mycolic acid, cord factor, phosphatides", "Polysaccharide capsule, melanin formation, urease activity", "Endotoxin, exotoxin, capsule"], "a": 2, "exp": "These three factors distinguish C. neoformans from other fungal yeasts and contribute to virulence."}, {"s": 6, "q": "India ink staining of Cryptococcus neoformans demonstrates:", "o": ["Red-stained cell walls", "Branching hyphae", "Intracellular inclusion bodies", "A clear halo (zone of clearance) around the capsule"], "a": 3, "exp": "Negative staining visualizes the capsule as a halo — a rapid identification method."}, {"s": 6, "q": "Cryptococcosis is most commonly disseminated to which site?", "o": ["Eyes", "Central nervous system (meningitis)", "Bone", "Skin"], "a": 1, "exp": "CNS dissemination (meningitis, meningoencephalitis) is the most common clinical manifestation."}, {"s": 6, "q": "Aspergillus colonies on Sabouraud agar are characteristically:", "o": ["Fast-growing, with variable colors (white, yellow, brown, black, green)", "Only grown anaerobically", "Always white only", "Slow-growing and colorless"], "a": 0, "exp": "Rapid growth with diverse pigmentation is characteristic of Aspergillus species."}, {"s": 6, "q": "Disseminated aspergillosis occurs primarily in:", "o": ["Severely immunosuppressed patients or IV drug users", "Immunocompetent healthy adults", "Only pediatric patients", "Patients with seasonal allergies"], "a": 0, "exp": "Hematogenous spread to brain, kidney, heart, bone occurs mainly in immunocompromised hosts."}, {"s": 6, "q": "Why is dermatophytosis (cutaneous mycosis) MORE inflammatory than superficial mycosis?", "o": ["It always involves systemic dissemination", "It never causes itching", "It is caused by bacteria, not fungi", "It involves deeper epidermal layers and hair roots, triggering a host immune response"], "a": 3, "exp": "Cutaneous mycoses penetrate deeper, unlike superficial mycoses limited to the stratum corneum (no immune response)."}, {"s": 7, "q": "All DNA viruses are dsDNA and icosahedral EXCEPT:", "o": ["HBV (ssDNA) and Adenovirus (complex)", "HPV (ssDNA) and HBV (complex)", "Herpesvirus (icosahedral exception) and Adenovirus (dsDNA exception)", "Parvovirus (ssDNA exception) and Poxvirus (complex shape exception)"], "a": 3, "exp": "Parvovirus is the ssDNA exception; Poxvirus is the icosahedral/inclusion body location exception."}, {"s": 7, "q": "Herpesviridae replicate within which host cell compartment?", "o": ["Mitochondria", "Cytoplasm only", "Golgi apparatus only", "Nucleus (via budding)"], "a": 3, "exp": "Enzymes for DNA replication are localized intranuclearly; the virus buds from the nucleus."}, {"s": 7, "q": "The diagnostic Paul-Bunnell test detects:", "o": ["CMV inclusion bodies", "EBV DNA directly", "HSV antigen", "Heterophile antibodies in infectious mononucleosis"], "a": 3, "exp": "Heterophile antibody detection (Paul-Bunnell test) supports EBV mononucleosis diagnosis."}, {"s": 7, "q": "HPV types 16 and 18 are significant because they:", "o": ["Only affect oral mucosa", "Are the lowest-risk HPV types", "Cause approximately 70% of cervical cancers and precancerous lesions", "Cause genital warts only, no cancer risk"], "a": 2, "exp": "These are high-risk oncogenic HPV types strongly linked to cervical cancer."}, {"s": 7, "q": "JC virus characteristically causes which disease in immunocompromised patients?", "o": ["Cervical cancer", "Progressive Multifocal Leukoencephalopathy (PML)", "Hemorrhagic cystitis", "Burkitt's lymphoma"], "a": 1, "exp": "JCV causes PML, while BKV causes hemorrhagic cystitis (especially post-bone marrow transplant)."}, {"s": 7, "q": "Why is chronic HBV infection more common in infants than adults?", "o": ["Infants have stronger immune responses against HBV", "Infants cannot be infected with HBV", "There is no age-related difference", "Age-dependent immune response: infants develop chronic carriage in 80-95% vs. 5-10% in adults"], "a": 3, "exp": "Perinatal HBV transmission carries a very high risk of chronicity due to immature immune response."}, {"s": 7, "q": "Influenza Hemagglutinin (HA) protein's primary function is:", "o": ["Releasing virus from infected cells", "Removing sialic acid", "Degrading the mucus layer", "Binding host receptors and enabling new strain evolution; agglutinates RBCs"], "a": 3, "exp": "HA mediates attachment; Neuraminidase (NA) handles viral release and mucus degradation."}, {"s": 7, "q": "Antigenic shift in influenza is most clinically significant because it:", "o": ["Only affects influenza type C", "Causes minor seasonal variation only", "Produces major new strains capable of causing pandemics, often via animal reservoirs (birds, swine)", "Has no role in epidemics"], "a": 2, "exp": "Shift (genetic reassortment, often from animal sources) drives pandemics, unlike minor drift causing seasonal epidemics."}, {"s": 7, "q": "Koplik's spots are pathognomonic for:", "o": ["Rubella", "Influenza", "Measles", "Mumps"], "a": 2, "exp": "Bluish-white ulcers on the buccal mucosa are characteristic early findings in measles."}, {"s": 7, "q": "HIV primarily targets cells expressing which surface receptor?", "o": ["CD4", "MHC class I only", "CD19", "CD8"], "a": 0, "exp": "HIV envelope spikes bind CD4 molecules on T-helper cells."}, {"s": 7, "q": "Why is rabies virus \"sheltered from the immune system\" during its pathogenesis?", "o": ["It mutates too quickly to be recognized", "It travels via axonal transport through nerves to the CNS, avoiding immune surveillance", "It remains in the bloodstream where antibodies cannot act", "It directly destroys all immune cells"], "a": 1, "exp": "Neural (axonal) spread keeps the virus largely hidden from circulating immune defenses until it reaches the CNS."}, {"s": 7, "q": "Post-exposure rabies wound care specifically avoids suturing the wound because:", "o": ["Sutures interfere with vaccine administration", "Closing the wound favors anaerobic bacterial growth and traps the virus", "It has no real significance, just convention", "Suturing increases bleeding risk"], "a": 1, "exp": "Leaving the wound open prevents anaerobic conditions and allows proper cleaning/antiserum infiltration."}];
const TERMS=[["Selective toxicity", "Ability of a drug to kill/inhibit a microorganism without damaging the host cell, based on structural/metabolic differences."], ["Bactericidal", "A drug that directly and irreversibly kills bacteria (e.g., Penicillin)."], ["Bacteriostatic", "A drug that inhibits bacterial growth; bacteria can regrow once the drug is withdrawn (e.g., Tetracycline)."], ["Narrow spectrum", "Antibiotic effective against only Gram-positive OR Gram-negative bacteria."], ["Broad spectrum", "Antibiotic effective against both Gram-positive AND Gram-negative bacteria."], ["Tuberculostatic", "Antibiotic effective specifically against Tubercle bacilli (e.g., Streptomycin, Rifampicin)."], ["Transpeptidase", "Enzyme responsible for forming cross-links in peptidoglycan; inactivated by Penicillin."], ["Penicillin-Binding Proteins (PBPs)", "Bacterial proteins that Penicillin binds to, blocking cell wall synthesis."], ["β-lactamase (penicillinase)", "Enzyme that destroys the β-lactam ring of Penicillin, converting it to inactive penicilloic acid."], ["Multidrug resistant (MDR)", "Microbes resistant to multiple groups of antimicrobial agents."], ["R-plasmids (R-factors)", "Plasmids carrying genes for antibiotic resistance, transferable between bacteria."], ["Efflux pump", "Membrane protein that actively pumps antibiotics out of the bacterial cell, causing multi-drug resistance (MAR)."], ["Synergism", "Combined effect of two drugs greater than the sum of their individual effects (e.g., Trimethoprim + Sulfamethoxazole)."], ["Toxoid", "A toxin chemically inactivated (e.g., by formaldehyde) but still immunogenic; used in vaccines (e.g., tetanus toxoid)."], ["Pseudomembrane", "An adherent membrane formed from fibrin/necrotic cells (classic in diphtheria), bleeds on removal."], ["Volutin granules", "Metachromatic, polyphosphate-containing granules characteristic of C. diphtheriae (Neisser stain)."], ["Chinese letter arrangement", "Club-shaped bacilli arranged in V/L/parallel patterns, characteristic of C. diphtheriae."], ["Elek's test", "In vitro precipitation test for diphtheria toxin production."], ["Malignant pustule", "Cutaneous anthrax lesion progressing from papule→vesicle→pustule→necrotic ulcer."], ["Medusa head colonies", "Rough, irregular colonies of B. anthracis on nutrient agar."], ["Ascoli test", "Thermo-precipitation reaction used to confirm anthrax antigen in tissue extracts."], ["Anthracoids", "Saprophytic, non-pathogenic Bacillus species resembling but distinct from B. anthracis."], ["Tetanospasmin", "Neurotoxin of Cl. tetani blocking glycine/GABA release, causing spastic paralysis."], ["Drumstick appearance", "Terminal spherical bulging spore morphology of Cl. tetani."], ["Flaccid paralysis", "Loss of muscle contraction ability, caused by botulinum toxin blocking acetylcholine release."], ["Lecithinase (alpha toxin)", "Enzyme of Cl. perfringens that disrupts cell membranes, causing hemolysis and necrosis."], ["Nagler's reaction", "Opalescence test on egg yolk agar detecting lecithinase activity."], ["Pseudomembranous colitis", "Cl. difficile-induced colonic inflammation following antibiotic-associated normal flora suppression."], ["Cord factor", "M. tuberculosis virulence factor that inhibits leukocyte migration."], ["Caseation necrosis", "Cheese-like necrotic tissue death typical of TB granulomas, mediated partly by phosphatides."], ["Ghon focus", "Primary TB lesion formed in macrophages before CMI develops; leads to fibrosis/calcification."], ["Miliary TB", "Disseminated TB resulting from hematogenous spread to multiple organs; often fatal."], ["Photochromogen", "Mycobacteria producing pigment only in the presence of light (e.g., M. kansasii)."], ["Scotochromogen", "Mycobacteria producing pigment in the dark (e.g., M. scrofulaceum)."], ["Mantoux (tuberculin) test", "Indirect skin test detecting latent TB via cell-mediated immunity."], ["Lepromin test", "Skin test distinguishing tuberculoid from lepromatous leprosy (not diagnostic)."], ["Oxidase test", "Hallmark biochemical test for Neisseria species (deep purple color)."], ["IMViC test", "Indole, Methyl red, Voges-Proskauer, Citrate tests used to differentiate Enterobacteriaceae."], ["Coliforms", "Lactose-fermenting Enterobacteriaceae used as water pollution indicators (e.g., E. coli)."], ["Vi antigen", "Anti-phagocytic polysaccharide capsule of Salmonella typhi."], ["Pyocyanin", "Blue-green pigment produced by Pseudomonas aeruginosa."], ["TCBS agar", "Selective medium (thiosulphate citrate bile salt sucrose) for Vibrio cholerae, showing yellow colonies."], ["Rice-water stool", "Classic watery, mucus-flecked diarrhea of severe cholera."], ["Urease test", "Detects ammonia production from urea breakdown; used diagnostically for H. pylori."], ["Bordet-Gengou medium", "Special enriched medium for culturing Bordetella pertussis, producing pearl-like colonies."]];
const REWRITES=[["Bacterial growth refers to an increase in the size of an individual cell.", "Bacterial growth refers to an increase in the number of cells (via binary fission), not cell size."], ["E. coli has a generation time of 24 hours, the same as Mycobacterium tuberculosis.", "E. coli has a generation time of about 20 minutes; M. tuberculosis takes about 24 hours."], ["During the log phase, the number of bacteria remains constant over time.", "During the log phase, bacteria double at a constant exponential rate, rapidly increasing in number."], ["In the stationary phase, the death rate is much higher than the growth rate.", "In the stationary phase, the growth rate equals the death rate (newly formed cells = dying cells)."], ["The lag phase of bacterial growth corresponds to the convalescent period of a disease.", "The lag phase corresponds to the incubation period of a disease (log phase = signs/symptoms; decline phase = convalescence)."], ["Autotrophs obtain their carbon from organic compounds like sugars and proteins.", "Autotrophs obtain carbon from CO2 (inorganic); heterotrophs use organic compounds."], ["A \"carrier\" is an individual who shows obvious symptoms of infection and can transmit it to others.", "A carrier shows NO symptoms but can still transmit the infectious agent to others."], ["Septicemia refers to the presence of an infectious agent localized only in one tissue.", "Septicemia refers to the presence of an infectious agent in the bloodstream."], ["Endotoxins are produced by both Gram-positive and Gram-negative bacteria and are highly antigenic.", "Endotoxins are found only in Gram-negative bacteria and are weakly immunogenic (exotoxins are produced by both types and are highly antigenic)."], ["Exotoxins are heat-stable, while endotoxins are heat-unstable.", "Exotoxins are heat-UNstable; endotoxins are heat-STABLE."], ["Endotoxins can be converted into toxoids using formalin for vaccine production.", "Exotoxins (not endotoxins) can be converted to toxoids by formalin/heat/acid for vaccines (e.g., tetanus toxoid)."], ["ID50 refers to the lethal dose of a toxin that kills 50% of test animals.", "ID50 is the Infectious Dose causing disease in 50% of inoculated animals; LD50 is the lethal dose."], ["S. aureus is catalase-negative, which distinguishes it from Streptococcus.", "S. aureus is catalase-POSITIVE; Streptococcus is catalase-negative."], ["S. aureus produces complete hemolysis (β-hemolysis) on mannitol salt agar.", "S. aureus shows β-hemolysis on BLOOD agar and ferments mannitol on mannitol salt agar (MSA) — these are different media/tests."], ["Streptococcus species grow easily on simple nutrient agar, unlike Staphylococcus.", "Streptococcus is fastidious and requires enriched media (blood/chocolate agar); it cannot grow on simple nutrient agar. Staphylococcus grows on ordinary media."], ["The bacitracin susceptibility test is specific for identifying Group B Streptococcus.", "The bacitracin test identifies Group A Streptococcus (S. pyogenes); the CAMP test identifies Group B (S. agalactiae)."], ["Sterilization aims to reduce the microbial population to a \"safe\" level but allows some spores to survive.", "Sterilization means COMPLETE removal/destruction of all microorganisms, including spores — no survival is acceptable (SAL 10^-6)."], ["Dry heat sterilization kills microorganisms mainly through coagulation and denaturation of proteins.", "Dry heat kills mainly through destructive OXIDATION; moist heat (autoclave) works via coagulation/denaturation."], ["Autoclaving is an excellent method for sterilizing oils and powders.", "Autoclaving is UNSUITABLE for oils and powders (steam cannot penetrate them); dry heat is used instead."], ["Pasteurization is a sterilization method that destroys all bacterial spores.", "Pasteurization is NOT a sterilization method — it kills most vegetative pathogens but does NOT kill bacterial spores."], ["Tinea versicolor causes deep tissue invasion with a strong infl const KEYS=['A','B','C','D'];

const tryState={answered:new Set(),correct:0,wrong:0,filter:'all'};
const ansFilter={filter:'all'};

function allQs(){return QS.map((q,i)=>({...q,gid:i}));}
function visibleQs(filter){
  const all=allQs();
  return filter==='all'?all:all.filter(q=>q.s==filter);
}

function switchTab(t){
  const tabs=document.querySelectorAll('.tab');
  const order=['try','answered','terms','rewrite','pastexams'];
  tabs.forEach((b,i)=>b.classList.toggle('active', order[i]===t));
  document.getElementById('try-panel').style.display=t==='try'?'':'none';
  document.getElementById('answered-panel').style.display=t==='answered'?'':'none';
  document.getElementById('terms-panel').style.display=t==='terms'?'':'none';
  document.getElementById('rewrite-panel').style.display=t==='rewrite'?'':'none';
  document.getElementById('pastexams-panel').style.display=t==='pastexams'?'':'none';
}

function filterTry(){tryState.filter=document.getElementById('sel-try').value;renderTry();}
function filterAns(){ansFilter.filter=document.getElementById('sel-ans').value;renderAns();}

// ===== TRY (MCQ) =====
function renderTry(){
  const qs=visibleQs(tryState.filter);
  const c=document.getElementById('try-quiz');c.innerHTML='';
  let lastS=-1;
  qs.forEach((item,idx)=>{
    if(tryState.filter==='all'&&item.s!==lastS){
      lastS=item.s;
      const d=document.createElement('div');d.className='sec-title';d.textContent=SECTIONS[item.s];c.appendChild(d);
    }
    const card=document.createElement('div');card.className='q-card';
    const optsHTML=item.o.map((opt,oi)=>`
      <button class="opt" id="to-${item.gid}-${oi}" onclick="pickMCQ(${item.gid},${oi})" ${tryState.answered.has(item.gid)?'disabled':''}>
        <span class="opt-key">${KEYS[oi]}</span><span class="opt-txt">${opt}</span>
      </button>`).join('');
    card.innerHTML=`<div class="q-top"><div class="q-badge">${idx+1}</div><div class="q-text">${item.q}</div></div><div class="opts">${optsHTML}</div><div class="fb" id="fb-${item.gid}"></div>`;
    c.appendChild(card);
    if(tryState.answered.has(item.gid)) restoreTry(item);
  });
  updateBar();
}

function restoreTry(item){
  const chosen=tryState['c'+item.gid];
  if(chosen==null)return;
  applyMCQ(item.gid,chosen,item.a,item.exp);
}

function pickMCQ(gid,chosen){
  if(tryState.answered.has(gid))return;
  tryState.answered.add(gid);
  const item=QS[gid];
  tryState['c'+gid]=chosen;
  applyMCQ(gid,chosen,item.a,item.exp);
  if(chosen===item.a)tryState.correct++;else tryState.wrong++;
  updateBar();
}

function applyMCQ(gid,chosen,correct,exp){
  for(let i=0;i<4;i++){
    const btn=document.getElementById(`to-${gid}-${i}`);
    if(!btn)continue;
    btn.disabled=true;
    if(i===chosen&&chosen===correct)btn.classList.add('s-correct');
    else if(i===chosen&&chosen!==correct)btn.classList.add('s-wrong');
    else if(i===correct&&chosen!==correct)btn.classList.add('s-reveal');
  }
  const fb=document.getElementById(`fb-${gid}`);
  if(fb){
    let html = (chosen===correct) ? '✓ Correct!' : '✗ Wrong';
    if(exp) html += `<div class="explanation"><strong>Why:</strong> ${exp}</div>`;
    fb.innerHTML=html;
    fb.className='fb show '+((chosen===correct)?'ok':'bad');
  }
}

function updateBar(){
  const qs=visibleQs(tryState.filter);
  const total=qs.length;
  const answered=qs.filter(q=>tryState.answered.has(q.gid)).length;
  const correct=qs.filter(q=>tryState.answered.has(q.gid)&&tryState['c'+q.gid]===q.a).length;
  document.getElementById('sc').textContent=correct;
  document.getElementById('sw').textContent=answered-correct;
  document.getElementById('stot').textContent=`${answered}/${total}`;
  document.getElementById('prog').style.width=`${total?Math.round(answered/total*100):0}%`;
}

function resetTry(){
  QS.forEach((_,i)=>{tryState.answered.delete(i);delete tryState['c'+i];});
  tryState.correct=0;tryState.wrong=0;renderTry();
}

// ===== MCQ ANSWERED =====
function renderAns(){
  const qs=visibleQs(ansFilter.filter);
  const c=document.getElementById('ans-quiz');c.innerHTML='';
  let lastS=-1;
  qs.forEach((item,idx)=>{
    if(ansFilter.filter==='all'&&item.s!==lastS){
      lastS=item.s;
      const d=document.createElement('div');d.className='sec-title';d.textContent=SECTIONS[item.s];c.appendChild(d);
    }
    const card=document.createElement('div');card.className='q-card';
    const optsHTML=item.o.map((opt,oi)=>`
      <div class="opt-ans ${oi===item.a?'correct':''}">
        <span class="opt-key ${oi===item.a?'correct':''}">${KEYS[oi]}</span>
        <span class="opt-txt">${opt}</span>
      </div>`).join('');
    let inner=`<div class="q-top"><div class="q-badge">${idx+1}</div><div class="q-text">${item.q}</div></div><div class="opts">${optsHTML}</div>`;
    if(item.exp) inner+=`<div class="explanation"><strong>Why:</strong> ${item.exp}</div>`;
    card.innerHTML=inner;
    c.appendChild(card);
  });
}

// ===== SCIENTIFIC TERMS (always ready) =====
function renderTerms(){
  const c=document.getElementById('terms-list');
  c.innerHTML='';
  TERMS.forEach((t,idx)=>{
    const card=document.createElement('div');
    card.className='term-card';
    card.innerHTML=`<div class="term-name">${idx+1}. ${t[0]}</div><div class="term-def">${t[1]}</div>`;
    c.appendChild(card);
  });
}

// ===== REWRITE-THE-ERROR (always ready) =====
function renderRewrites(){
  const c=document.getElementById('rewrite-list');
  c.innerHTML='';
  REWRITES.forEach((r,idx)=>{
    const card=document.createElement('div');
    card.className='rw-card';
    card.innerHTML=`
      <div class="rw-wrong"><strong>${idx+1}. Wrong:</strong> ${r[0]}</div>
      <div class="rw-correct"><strong>Correct:</strong> ${r[1]}</div>`;
    c.appendChild(card);
  });
}

  PASTEXAMS_MCQ.forEach((item,idx)=>{

    const optsHTML=item.o.map((opt,oi)=>`
      <div class="opt-ans ${oi===item.a?'correct':''}">
        <span class="opt-key ${oi===item.a?'correct':''}">${KEYS[oi]}</span>
        <span class="opt-txt">${opt}</span>
      </div>`).join('');
    let inner=`<div class="q-top"><div class="q-badge">${idx+1}</div><div class="q-text">${item.q}</div></div><div class="opts">${optsHTML}</div>`;
    if(item.exp) inner+=`<div class="explanation"><strong>Why:</strong> ${item.exp}</div>`;
    card.innerHTML=inner;
    c.appendChild(card);
  });

  const tfTitle=document.createElement('div');
  tfTitle.className='sec-title';
  tfTitle.textContent='Part II — True / False';
  c.appendChild(tfTitle);

  PASTEXAMS_TF.forEach((item,idx)=>{
    const card=document.createElement('div');card.className='q-card';
    let inner=`<div class="q-top"><div class="q-badge">${idx+1}</div><div class="q-text">${item.q}</div></div>`;
    inner+=`<div><span class="tf-ans-badge ${item.a?'true':'false'}">${item.a?'TRUE':'FALSE'}</span></div>`;
    if(item.exp) inner+=`<div class="explanation"><strong>Why:</strong> ${item.exp}</div>`;
    card.innerHTML=inner;
    c.appendChild(card);
  });
}

renderTry();
renderAns();
renderTerms();
renderRewrites();
renderPastExams();
</script>
